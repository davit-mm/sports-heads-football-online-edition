<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Heads Football - Online Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      color: #ffd700;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }
    #gameCanvas {
      border: 3px solid #333;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0,100,200,0.3);
      display: none;
    }

    /* Menu Screens */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      background: rgba(0,0,0,0.4);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 500px;
      width: 90%;
    }
    .screen.active { display: flex; }
    .screen h2 {
      font-size: 22px;
      color: #ffd700;
      margin-bottom: 10px;
    }

    .btn {
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 200px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      color: white;
      box-shadow: 0 4px 15px rgba(76,175,80,0.4);
    }
    .btn-secondary {
      background: linear-gradient(135deg, #2196F3, #1565C0);
      color: white;
      box-shadow: 0 4px 15px rgba(33,150,243,0.4);
    }
    .btn-warning {
      background: linear-gradient(135deg, #FF9800, #E65100);
      color: white;
      box-shadow: 0 4px 15px rgba(255,152,0,0.4);
    }
    .btn-small {
      padding: 8px 20px;
      font-size: 13px;
      min-width: 120px;
    }

    input[type="text"] {
      padding: 12px 20px;
      font-size: 18px;
      border-radius: 8px;
      border: 2px solid #444;
      background: #2a2a3e;
      color: white;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 4px;
      width: 200px;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #4CAF50;
    }

    /* Team Selection */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
      width: 100%;
    }
    .team-btn {
      padding: 10px 5px;
      font-size: 12px;
      font-weight: bold;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      background: #2a2a3e;
      color: #ccc;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .team-btn:hover { border-color: #4CAF50; color: white; }
    .team-btn.selected {
      border-color: #ffd700;
      color: #ffd700;
      background: #3a3a4e;
    }
    .team-flag {
      font-size: 28px;
    }

    .room-code {
      font-size: 36px;
      font-weight: bold;
      color: #ffd700;
      letter-spacing: 6px;
      background: #2a2a3e;
      padding: 15px 30px;
      border-radius: 8px;
      user-select: all;
    }

    .status-text {
      color: #aaa;
      font-size: 14px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .controls-info {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 10px;
    }

    .error-msg {
      color: #ff4444;
      font-size: 14px;
    }

    .or-divider {
      color: #666;
      font-size: 14px;
      position: relative;
      width: 100%;
      text-align: center;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #444;
    }
    .or-divider::before { left: 0; }
    .or-divider::after { right: 0; }

    #hud {
      display: none;
      width: 800px;
      position: relative;
      height: 40px;
    }
    .hud-left {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hud-right {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hud-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .hud-score {
      font-size: 36px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .hud-timer {
      font-size: 22px;
      color: #ffd700;
      font-weight: bold;
      background: rgba(0,0,0,0.7);
      padding: 4px 16px;
      border-radius: 6px;
      font-style: italic;
    }
    .hud-team {
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <h1>SPORTS HEADS FOOTBALL</h1>
  <div class="subtitle">Online Edition</div>

  <!-- Main Menu -->
  <div id="menuScreen" class="screen active">
    <h2>Select Your Team</h2>
    <div class="team-grid" id="teamGrid"></div>
    <button class="btn btn-primary" id="btnQuickMatch">Quick Match</button>
    <div class="or-divider">OR</div>
    <button class="btn btn-secondary" id="btnCreateRoom">Create Room</button>
    <div style="display:flex; gap:10px; align-items:center;">
      <input type="text" id="roomCodeInput" placeholder="CODE" maxlength="6">
      <button class="btn btn-warning btn-small" id="btnJoinRoom">Join</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="controls-info">
      Controls: Arrow Keys to move | Up to jump | Spacebar to kick
    </div>
  </div>

  <!-- Waiting Screen -->
  <div id="waitingScreen" class="screen">
    <h2>Room Created</h2>
    <p>Share this code with your friend:</p>
    <div class="room-code" id="roomCodeDisplay"></div>
    <p class="status-text">Waiting for opponent...</p>
    <button class="btn btn-small btn-secondary" id="btnBackToMenu">Back</button>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen" class="screen">
    <h2 id="resultText"></h2>
    <div id="finalScore" style="font-size: 32px; font-weight: bold;"></div>
    <button class="btn btn-primary" id="btnPlayAgain">Play Again</button>
    <button class="btn btn-secondary" id="btnBackMenu">Back to Menu</button>
    <p class="status-text" id="rematchStatus" style="display:none;"></p>
  </div>

  <!-- Disconnected Screen -->
  <div id="disconnectedScreen" class="screen">
    <h2>Opponent Disconnected</h2>
    <p>Your opponent left the game.</p>
    <button class="btn btn-primary" id="btnBackAfterDc">Back to Menu</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-left">
      <span class="hud-team" id="hudLeftTeam" style="color:#ff4444;"></span>
      <span class="hud-score" id="hudLeftScore" style="color:#fff;">0</span>
    </div>
    <div class="hud-center">
      <span class="hud-timer" id="hudTimer">1:00</span>
    </div>
    <div class="hud-right">
      <span class="hud-score" id="hudRightScore" style="color:#fff;">0</span>
      <span class="hud-team" id="hudRightTeam" style="color:#ff4444;"></span>
    </div>
  </div>

  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
